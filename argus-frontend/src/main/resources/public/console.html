<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus Console</title>
    <link rel="stylesheet" href="/css/console.css">
    <link rel="stylesheet" href="/css/theme.css">
    <script src="/js/theme-preboot.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/pod-context.js"></script>
</head>
<body>

    <header>
        <div class="logo">
            <a href="/" class="back-link">&larr;</a>
            <img src="/img/argus_logo.png" alt="Argus" class="logo-img">
            <h1>Argus Console</h1>
        </div>
        <div class="header-actions">
            <a href="/" class="btn" title="JVM Dashboard">Dashboard</a>
            <a href="/fleet.html" class="btn" title="Fleet Command Center">Fleet</a>
            <a href="/profiles.html" class="btn" title="Continuous Profiles">Profiles</a>
            <!-- Pod picker: only shown in cluster mode (when /api/pods returns 200). -->
            <label class="pod-picker" id="pod-picker-wrap" hidden>
                <span class="pod-picker-label">Pod</span>
                <select id="pod-picker" aria-label="Select pod"></select>
            </label>
            <button type="button" class="argus-theme-toggle" aria-label="Toggle theme"></button>
            <a href="https://github.com/rlaope/Argus" target="_blank" class="btn btn-icon" title="GitHub">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
        </div>
    </header>

    <main>
        <!-- Terminal (TOP) -->
        <section class="terminal-section">
            <div class="terminal">
                <div class="terminal-header">
                    <span class="terminal-dot red"></span>
                    <span class="terminal-dot yellow"></span>
                    <span class="terminal-dot green"></span>
                    <span class="terminal-title" id="terminal-title">argus — loading...</span>
                    <button id="clear-terminal" class="terminal-clear" title="Clear">Clear</button>
                </div>
                <div class="terminal-body" id="terminal-body">
                    <div class="terminal-line">
                        <span class="prompt">argus&gt;</span>
                        <span class="output-text"> Welcome to Argus Interactive Console. Click a command below to run it.</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Command search + Buttons (BOTTOM) -->
        <section class="commands-section">
            <div class="commands-search-row">
                <input type="search" id="commands-search" class="commands-search"
                       placeholder="Filter commands… (e.g. gc, thread, heap)"
                       autocomplete="off" spellcheck="false">
                <span class="commands-search-count" id="commands-search-count"></span>
            </div>
            <section class="commands-panel" id="commands-panel">
                <!-- Groups rendered dynamically from /api/commands -->
            </section>
        </section>
    </main>

    <script>
        // Display names for known command groups. Unknown groups (e.g. future
        // additions from server-side SPI) are still rendered — see humanizeGroup().
        const GROUP_LABELS = {
            system: 'System',
            memory: 'Memory & GC',
            threads: 'Threads',
            runtime: 'Class & Runtime',
            diagnostic: 'Diagnostics'
        };

        // Render order for known groups. Unknown groups are appended after these,
        // sorted alphabetically, so newly-registered groups become visible immediately
        // without a frontend change.
        const GROUP_ORDER = ['system', 'memory', 'threads', 'runtime', 'diagnostic'];

        function humanizeGroup(key) {
            if (GROUP_LABELS[key]) return GROUP_LABELS[key];
            // Title-case the first letter, replace - / _ with spaces.
            return key.replace(/[-_]/g, ' ')
                .replace(/\b\w/g, c => c.toUpperCase());
        }

        const terminalBody = document.getElementById('terminal-body');
        const terminalTitle = document.getElementById('terminal-title');
        let isRunning = false;
        // Cluster mode is decided by the presence of /api/pods on the
        // current origin. When true, the page is being served by the
        // aggregator and commands must be proxied with ?pod=<id>.
        let clusterMode = false;
        let selectedPodId = null;

        const podContext = window.ArgusPodContext;

        async function detectClusterMode() {
            try {
                const res = await fetch('/api/pods');
                if (!res.ok) return null;
                const data = await res.json();
                if (!data || !Array.isArray(data.pods)) return null;
                clusterMode = true;
                return data.pods;
            } catch (e) {
                return null;
            }
        }

        function renderPodPicker(pods) {
            const wrap = document.getElementById('pod-picker-wrap');
            const select = document.getElementById('pod-picker');
            wrap.hidden = false;
            select.replaceChildren();

            if (!pods.length) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = 'No pods registered';
                opt.disabled = true;
                opt.selected = true;
                select.appendChild(opt);
                return;
            }

            const byGroup = podContext.groupPods(pods);
            const initial = podContext.selectInitialPod(pods);

            Object.keys(byGroup).sort().forEach(group => {
                const og = document.createElement('optgroup');
                og.label = group;
                byGroup[group].sort((a, b) => a.podName.localeCompare(b.podName))
                    .forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.podId;
                        opt.textContent = p.podName + (p.scrapeOk ? '' : ' ·offline');
                        if (p.podId === initial) opt.selected = true;
                        og.appendChild(opt);
                    });
                select.appendChild(og);
            });

            selectedPodId = initial;
            podContext.writeStoredPod(initial);

            select.addEventListener('change', async () => {
                selectedPodId = select.value;
                podContext.writeStoredPod(selectedPodId);
                podContext.writePodParam(selectedPodId);
                await loadCommands();
                updateTerminalTitle();
            });
        }

        function commandsEndpoint() {
            if (clusterMode && selectedPodId) {
                return '/api/pods/' + encodeURIComponent(selectedPodId) + '/commands';
            }
            return '/api/commands';
        }

        function execEndpoint(cmd) {
            const c = encodeURIComponent(cmd);
            if (clusterMode && selectedPodId) {
                return '/api/exec?pod=' + encodeURIComponent(selectedPodId) + '&cmd=' + c;
            }
            return '/api/exec?cmd=' + c;
        }

        function execMethod() {
            return clusterMode ? 'POST' : 'GET';
        }

        async function updateTerminalTitle() {
            if (clusterMode && selectedPodId) {
                terminalTitle.textContent = 'argus — ' + selectedPodId;
                return;
            }
            try {
                const pres = await fetch('/api/process');
                const pdata = await pres.json();
                terminalTitle.textContent = 'argus — ' + pdata.processInfo;
            } catch (e) {
                terminalTitle.textContent = 'argus@jvm';
            }
        }

        async function init() {
            const pods = await detectClusterMode();
            if (clusterMode) renderPodPicker(pods);
            await updateTerminalTitle();
            await loadCommands();
        }

        async function loadCommands() {
            try {
                const res = await fetch(commandsEndpoint());
                const data = await res.json();

                if (!data || !Array.isArray(data.commands)) {
                    appendOutput('Pod returned no commands list.', 'error');
                    return;
                }

                const grouped = {};
                data.commands.forEach(c => {
                    const g = c.group || 'other';
                    if (!grouped[g]) grouped[g] = [];
                    grouped[g].push(c);
                });

                const panel = document.getElementById('commands-panel');
                panel.innerHTML = '';

                // Render known groups first in the canonical order, then any
                // additional groups returned by the server alphabetically. This
                // makes newly-registered command groups visible without a
                // frontend change — they just appear at the end with a
                // humanized title.
                const seen = new Set(GROUP_ORDER);
                const renderOrder = [
                    ...GROUP_ORDER,
                    ...Object.keys(grouped).filter(g => !seen.has(g)).sort()
                ];

                for (const groupId of renderOrder) {
                    const cmds = grouped[groupId];
                    if (!cmds || cmds.length === 0) continue;

                    const group = document.createElement('div');
                    group.className = 'commands-group';

                    const h3 = document.createElement('h3');
                    h3.textContent = humanizeGroup(groupId);
                    group.appendChild(h3);

                    const row = document.createElement('div');
                    row.className = 'commands-row';

                    cmds.forEach(cmd => {
                        const btn = document.createElement('button');
                        btn.className = 'cmd-btn';
                        btn.textContent = cmd.id;
                        btn.title = cmd.description || cmd.id;
                        btn.dataset.searchKey = (cmd.id + ' ' + (cmd.description || '')).toLowerCase();
                        btn.addEventListener('click', () => executeCommand(cmd.id));
                        row.appendChild(btn);
                    });

                    group.appendChild(row);
                    panel.appendChild(group);
                }
            } catch (e) {
                appendOutput('Failed to load commands: ' + e.message, 'error');
            } finally {
                setupCommandSearch();
            }
        }

        // Search wiring runs once. Each loadCommands() call rebuilds the
        // button DOM, so `apply` reads the button list fresh each time
        // rather than capturing it in a closure. This preserves the user's
        // typed query and focus across pod switches (rebuilding the input
        // would discard both).
        let searchWired = false;
        function setupCommandSearch() {
            const input = document.getElementById('commands-search');
            const countEl = document.getElementById('commands-search-count');
            if (!input || !countEl) return;

            function apply() {
                const allBtns = Array.from(document.querySelectorAll('.cmd-btn'));
                const totalCount = allBtns.length;
                const q = input.value.trim().toLowerCase();
                let visible = 0;
                allBtns.forEach(btn => {
                    const match = !q || (btn.dataset.searchKey || '').includes(q);
                    btn.style.display = match ? '' : 'none';
                    if (match) visible++;
                });
                document.querySelectorAll('.commands-group').forEach(g => {
                    const any = Array.from(g.querySelectorAll('.cmd-btn'))
                        .some(b => b.style.display !== 'none');
                    g.style.display = any ? '' : 'none';
                });
                countEl.textContent = q
                    ? visible + ' / ' + totalCount + ' match'
                    : totalCount + ' commands';
            }

            if (!searchWired) {
                input.addEventListener('input', apply);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') { input.value = ''; apply(); }
                });
                searchWired = true;
            }
            apply();
        }

        async function executeCommand(cmd) {
            if (isRunning) return;
            isRunning = true;

            document.querySelectorAll('.cmd-btn').forEach(b => b.classList.remove('active'));
            const buttons = [...document.querySelectorAll('.cmd-btn')];
            const activeBtn = buttons.find(b => b.textContent === cmd && b.style.display !== 'none')
                               || buttons.find(b => b.textContent === cmd);
            if (activeBtn) activeBtn.classList.add('active');

            // Type command animation
            const line = document.createElement('div');
            line.className = 'terminal-line';
            const prompt = document.createElement('span');
            prompt.className = 'prompt';
            prompt.textContent = 'argus>';
            const cmdText = document.createElement('span');
            cmdText.className = 'command-text';
            line.appendChild(prompt);
            line.appendChild(cmdText);
            terminalBody.appendChild(line);

            const fullCmd = ' ' + cmd;
            for (let i = 0; i < fullCmd.length; i++) {
                cmdText.textContent += fullCmd[i];
                await sleep(25 + Math.random() * 35);
            }

            // Loading
            const loading = document.createElement('div');
            loading.className = 'terminal-line loading-line';
            const dots = document.createElement('span');
            dots.className = 'loading-dots';
            dots.textContent = '...';
            loading.appendChild(dots);
            terminalBody.appendChild(loading);
            scrollToBottom();

            try {
                const res = await fetch(execEndpoint(cmd), { method: execMethod() });
                const data = await res.json();
                loading.remove();

                if (data.error) {
                    // Two shapes possible:
                    //  - argus-server: { error: "string" }
                    //  - aggregator:   { error: { code, message } }
                    const msg = (typeof data.error === 'string')
                        ? data.error
                        : (data.error.message || JSON.stringify(data.error));
                    appendOutput(msg, 'error');
                } else {
                    appendOutput(data.output != null ? data.output : '(no output)', 'success');
                }
            } catch (e) {
                loading.remove();
                appendOutput('Error: ' + e.message, 'error');
            }

            if (activeBtn) activeBtn.classList.remove('active');
            isRunning = false;
            scrollToBottom();
        }

        function appendOutput(text, type) {
            const line = document.createElement('div');
            line.className = 'terminal-line output-line';
            const pre = document.createElement('pre');
            pre.className = 'output ' + (type || '');
            pre.textContent = text;
            line.appendChild(pre);
            terminalBody.appendChild(line);
            scrollToBottom();
        }

        function scrollToBottom() {
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        document.getElementById('clear-terminal').addEventListener('click', () => {
            terminalBody.replaceChildren();
            const line = document.createElement('div');
            line.className = 'terminal-line';
            const prompt = document.createElement('span');
            prompt.className = 'prompt';
            prompt.textContent = 'argus>';
            const text = document.createElement('span');
            text.className = 'output-text';
            text.textContent = ' Terminal cleared.';
            line.appendChild(prompt);
            line.appendChild(text);
            terminalBody.appendChild(line);
        });

        init();
    </script>
</body>
</html>
