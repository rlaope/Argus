doctor.profile.rule.hotwait.title=높은 대기 시간: CPU 샘플의 %.1f%%가 블로킹 호출
doctor.profile.rule.hotwait.detail=CPU 샘플의 %.1f%%가 블로킹/대기 메서드에 있습니다: %s. 워커 풀이 바빠야 한다면 동기화 병목을 확인하세요.
