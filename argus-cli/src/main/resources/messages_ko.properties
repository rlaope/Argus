cmd.profile.event.output.format.desc=flamegraph|collapsed|jfr|flat|traces|tree|text|otlp|ascii. ascii=터미널 미리보기. speedscope/pprof는 asprof 4.x에서 지원되지 않습니다.
error.profile.event.invalid.type=잘못된 프로파일링 이벤트: '%s'. 문자로 시작하고 문자, 숫자, 점, 하이픈, 밑줄만 허용됩니다 (예: cpu, cache-misses, java.lang.String.intern)

# Continuous profiling mode
cmd.profile.continuous.desc=--interval 초마다 덤프+비교를 반복합니다
cmd.profile.continuous.interval.desc=덤프 간격(초, 기본: 30)
cmd.profile.continuous.window.desc=스냅샷 보존 기간(분, 기본: 5); 오래된 파일은 삭제됩니다
cmd.profile.continuous.output.dir.desc=스냅샷 파일을 저장할 디렉터리
cmd.profile.continuous.diff.against.desc=이전 사이클 대신 고정 기준 스냅샷과 비교
status.profile.continuous.started=PID %s 연속 프로파일링 시작 (이벤트: %s, 간격: %ss). Ctrl-C로 중지
status.profile.continuous.stopped=연속 프로파일링이 중지되었습니다.
status.profile.continuous.line=[%s] +%s 샘플 (최상위: %s %.1f%%, %s%.1fpp vs 이전)
status.profile.continuous.line.first=[%s] +%s 샘플 (최상위: %s %.1f%%)
error.profile.continuous.baseline.load=--diff-against 기준 로드 실패: %s
error.profile.continuous.dump.failed=덤프 실패: %s
error.profile.continuous.parse.failed=스냅샷 파싱 실패: %s

