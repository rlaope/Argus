doctor.profile.rule.hotalloc.detail=메서드 %s가 할당 샘플의 %.1f%%를 차지합니다. 예상치 못한 경우 `--type=alloc --live`로 생존 객체를 확인하세요.
doctor.profile.rule.dominant.title=지배적 메서드: %s가 샘플의 %.1f%%
doctor.profile.rule.dominant.detail=하나의 메서드(%s)가 샘플의 %.1f%%를 지배합니다. 타이트한 루프 또는 폭주 연산일 가능성이 높습니다.

