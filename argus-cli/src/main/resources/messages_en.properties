# Command descriptions (shown in output)
desc.histo=Analyzes heap memory objects. Count = live instances, Size = total bytes occupied.
desc.threads=Summarizes thread states. BLOCKED threads may indicate lock contention.
desc.gc=Shows garbage collection activity. High overhead (>5%) may impact application performance.
desc.heap=Shows heap memory regions. High usage in Old Gen may indicate memory pressure.
desc.gcutil=Monitors GC generation utilization. S0/S1 = Survivor, E = Eden, O = Old, M = Metaspace, CCS = Compressed Class.
desc.info=Displays JVM runtime details and configuration flags.
desc.ps=Lists all running Java Virtual Machine processes on this host.
desc.sysprops=Displays JVM system properties (-D flags and runtime defaults). Use --filter to search.
desc.vmflag=Shows all non-default VM flags. Use --set to modify manageable flags at runtime.
desc.nmt=Shows native memory usage by category. Requires -XX:NativeMemoryTracking=summary on target JVM.
desc.classloader=Shows class loader hierarchy and loaded class counts per loader.
desc.jfr=Controls JDK Flight Recorder: start, stop, check, and dump recordings.
desc.diff=Compares two heap snapshots to detect memory growth. Positive delta indicates potential leak.
desc.report=Comprehensive JVM diagnostic report. Collects all available metrics in one view.

