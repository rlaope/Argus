{{- if .Values.operator.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: argustargets.argus.io
  labels:
    {{- include "argus.labels" . | nindent 4 }}
    argus.io/crd: "true"
  annotations:
    argus.io/lifecycle: alpha
spec:
  group: argus.io
  scope: Namespaced
  names:
    kind: ArgusTarget
    listKind: ArgusTargetList
    plural: argustargets
    singular: argustarget
    shortNames:
      - at
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Pod
          type: string
          jsonPath: .spec.podName
        - name: Host
          type: string
          jsonPath: .spec.host
        - name: Port
          type: integer
          jsonPath: .spec.port
        - name: Fleet
          type: string
          jsonPath: .spec.fleetRef
        - name: Registered
          type: boolean
          jsonPath: .status.registered
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - podName
                - podNamespace
                - host
                - port
              properties:
                podName:
                  type: string
                podNamespace:
                  type: string
                deployment:
                  type: string
                  default: ""
                host:
                  type: string
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  default: 7070
                labels:
                  type: object
                  additionalProperties:
                    type: string
                fleetRef:
                  type: string
                  description: "Name of the ArgusFleet this target belongs to (same namespace)."
            status:
              type: object
              properties:
                registered:
                  type: boolean
                lastRegisteredAt:
                  type: string
                phase:
                  type: string
                message:
                  type: string
{{- end }}
