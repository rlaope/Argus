# Argus agent configuration
agent:
  # Port for metrics/dashboard server
  port: 9202
  # Bind address (0.0.0.0 for K8s)
  bindAddress: "0.0.0.0"

  # Feature toggles (match -Dargus.* system properties)
  gc:
    enabled: true
  cpu:
    enabled: true
    intervalMs: 1000
  allocation:
    enabled: false
    threshold: 1048576
  metaspace:
    enabled: true
  profiling:
    enabled: false
    intervalMs: 20
  contention:
    enabled: false
    thresholdMs: 50
  correlation:
    enabled: true

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  path: /prometheus
  port: argus-metrics
  # Additional labels for ServiceMonitor (e.g., for Prometheus Operator selector)
  additionalLabels: {}
  # Namespace selector — if empty, uses Release namespace
  namespaceSelector: {}
  # Label selector for target pods — must match your app's pod labels
  selector:
    matchLabels:
      argus.io/enabled: "true"

# Prometheus alerting rules
prometheusRule:
  enabled: true
  additionalLabels: {}
  rules:
    gcOverhead:
      enabled: true
      threshold: 0.10
      duration: 5m
      severity: warning
    memoryLeak:
      enabled: true
      duration: 10m
      severity: critical
    highCpu:
      enabled: true
      threshold: 0.80
      duration: 5m
      severity: warning
    gcPauseP99:
      enabled: true
      # seconds — alert when the 5m p99 GC pause exceeds this
      threshold: 0.5
      duration: 5m
      severity: warning
  # Prometheus recording rules (pre-computed series for dashboards/alerts)
  recordingRules:
    enabled: true

# Grafana dashboard
grafana:
  enabled: true
  # Dashboard ConfigMap label for Grafana sidecar auto-discovery
  sidecarLabel: grafana_dashboard
  sidecarLabelValue: "1"
  folder: "Argus"

# NetworkPolicy
networkPolicy:
  enabled: false
  # Allow ingress from Prometheus namespace
  ingressFrom:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus

# argus-aggregator: Netty REST service that aggregates fleet data.
# Owned by the W1 aggregator-core module. The operator NetworkPolicy lives
# in this chart and references the values below; the aggregator deployment
# is templated by the aggregator-owned templates (see W1).
aggregator:
  enabled: false
  port: 9300
  networkPolicy:
    # Lock aggregator REST ingress to operator + frontend + opt-in
    # (label argus.io/aggregator-client=true) pods. Defaults to true whenever
    # the operator is enabled, since the REST API is currently unauthenticated.
    enabled: true
    # Append additional NetworkPolicy 'from:' entries (raw YAML) for
    # environment-specific scrapers (e.g. a managed Prometheus namespace).
    extraFrom: []

# argus-operator: K8s controller that auto-discovers argus-agent pods
# (label argus.io/scrape=true) and registers them with argus-aggregator via REST.
# ArgusFleet + ArgusTarget CRDs (apiVersion argus.io/v1alpha1, alpha) are
# installed unconditionally from charts/argus/crds/ — they are inert without
# the operator and are safe to leave in the cluster.
operator:
  enabled: false
  replicas: 1
  image:
    repository: ghcr.io/rlaope/argus-operator
    tag: ""
    pullPolicy: IfNotPresent
  # Base URL for argus-aggregator's REST API (see docs/aggregator-api.md).
  aggregatorUrl: "http://argus-aggregator.argus-system.svc.cluster.local:9300"
  # Restrict watch to a single namespace; empty = cluster-wide.
  watchNamespace: ""
  # Informer resync period in ms.
  resyncPeriodMs: 60000
  resources: {}
