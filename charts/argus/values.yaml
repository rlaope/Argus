# Argus agent configuration
agent:
  # Port for metrics/dashboard server
  port: 9202
  # Bind address (0.0.0.0 for K8s)
  bindAddress: "0.0.0.0"

  # Feature toggles (match -Dargus.* system properties)
  gc:
    enabled: true
  cpu:
    enabled: true
    intervalMs: 1000
  allocation:
    enabled: false
    threshold: 1048576
  metaspace:
    enabled: true
  profiling:
    enabled: false
    intervalMs: 20
  contention:
    enabled: false
    thresholdMs: 50
  correlation:
    enabled: true

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  path: /prometheus
  port: argus-metrics
  # Additional labels for ServiceMonitor (e.g., for Prometheus Operator selector)
  additionalLabels: {}
  # Namespace selector — if empty, uses Release namespace
  namespaceSelector: {}
  # Label selector for target pods — must match your app's pod labels
  selector:
    matchLabels:
      argus.io/enabled: "true"

# Prometheus alerting rules
prometheusRule:
  enabled: true
  additionalLabels: {}
  rules:
    gcOverhead:
      enabled: true
      threshold: 0.10
      duration: 5m
      severity: warning
    memoryLeak:
      enabled: true
      duration: 10m
      severity: critical
    highCpu:
      enabled: true
      threshold: 0.80
      duration: 5m
      severity: warning

# Grafana dashboard
grafana:
  enabled: true
  # Dashboard ConfigMap label for Grafana sidecar auto-discovery
  sidecarLabel: grafana_dashboard
  sidecarLabelValue: "1"
  folder: "Argus"

# NetworkPolicy
networkPolicy:
  enabled: false
  # Allow ingress from Prometheus namespace
  ingressFrom:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus

# argus-operator: K8s controller that auto-discovers argus-agent pods
# (label argus.io/scrape=true) and registers them with argus-aggregator via REST.
# Installs ArgusFleet + ArgusTarget CRDs (apiVersion argus.io/v1alpha1, alpha).
operator:
  enabled: false
  replicas: 1
  image:
    repository: ghcr.io/rlaope/argus-operator
    tag: ""
    pullPolicy: IfNotPresent
  # Base URL for argus-aggregator's REST API (see docs/aggregator-api.md).
  aggregatorUrl: "http://argus-aggregator.argus-system.svc.cluster.local:9100"
  # Restrict watch to a single namespace; empty = cluster-wide.
  watchNamespace: ""
  # Informer resync period in ms.
  resyncPeriodMs: 60000
  resources: {}
