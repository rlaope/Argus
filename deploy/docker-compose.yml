version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    # This is just the agent image for reference
    # Replace with your actual app service

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/argus.json
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ../../docs/grafana-dashboard.json:/var/lib/grafana/dashboards/argus.json
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
