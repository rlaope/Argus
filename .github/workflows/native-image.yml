name: Native Image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: argus-linux-amd64
          - os: macos-latest
            artifact: argus-macos-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: graalvm/setup-graalvm@54b4f5a65c1a84b2fdfdc2078fe43df32819e4b1  # v1.4.5
        with:
          java-version: '21'
          distribution: 'graalvm'
      - name: Build fat JAR
        run: ./gradlew :argus-cli:fatJar
      - name: Build native image
        run: |
          native-image --no-fallback \
            -jar argus-cli/build/libs/argus-cli-*-all.jar \
            -o argus \
            --enable-url-protocols=http \
            -H:+ReportExceptionStackTraces
      - name: Rename for platform-specific upload
        run: mv argus ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
      - name: Resolve release tag
        id: tag
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/'))
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload to release
        if: steps.tag.outputs.name != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ steps.tag.outputs.name }} ${{ matrix.artifact }} --clobber
