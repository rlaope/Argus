name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0

      - name: Build with Gradle
        run: ./gradlew build :argus-cli:fatJar

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename JARs for release
        run: |
          cp argus-agent/build/libs/argus-agent-*.jar argus-agent.jar
          cp argus-server/build/libs/argus-server-*.jar argus-server.jar
          cp argus-cli/build/libs/argus-cli-*-all.jar argus-cli-${{ steps.version.outputs.VERSION }}-all.jar

      - name: Generate SHA-256 checksums
        run: |
          sha256sum \
            argus-agent.jar \
            argus-server.jar \
            argus-cli-${{ steps.version.outputs.VERSION }}-all.jar \
            > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: Argus ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            argus-agent.jar
            argus-server.jar
            argus-cli-${{ steps.version.outputs.VERSION }}-all.jar
            checksums.txt

      - name: Trigger native-image build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run native-image.yml --ref ${{ github.ref_name }}
