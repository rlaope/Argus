name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4

      - name: Build with Gradle
        run: ./gradlew build :argus-cli:fatJar

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename JARs for release
        run: |
          cp argus-agent/build/libs/argus-agent-*.jar argus-agent.jar
          cp argus-server/build/libs/argus-server-*.jar argus-server.jar
          cp argus-cli/build/libs/argus-cli-*-all.jar argus-cli-${{ steps.version.outputs.VERSION }}-all.jar

      - name: Generate SHA-256 checksums
        run: |
          sha256sum \
            argus-agent.jar \
            argus-server.jar \
            argus-cli-${{ steps.version.outputs.VERSION }}-all.jar \
            > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: Argus ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            argus-agent.jar
            argus-server.jar
            argus-cli-${{ steps.version.outputs.VERSION }}-all.jar
            checksums.txt

      - name: Trigger native-image build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run native-image.yml --ref ${{ github.ref_name }}
